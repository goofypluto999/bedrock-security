  # ---- client-exposure (NEW cluster: frontend/build-time leakage) ----

  - id: CLIENT-ENV-001
    title: No secret behind a client-exposed env prefix
    domain: client-exposure
    phase: static
    severity: critical
    method: static-scan
    oracle: [CWE-200, CWE-615, OWASP A02:2021]
    frameworks: { nist_csf: [PR.DS], mitre_attack: [T1552] }
    applicability:
      question: Is this a frontend/bundled app (Next.js, Vite, CRA, Expo) reading env vars?
      auto_probe:
        type: antipattern
        patterns: ['(NEXT_PUBLIC_|VITE_|REACT_APP_|EXPO_PUBLIC_|PUBLIC_)\w*(SECRET|SERVICE_ROLE|PRIVATE_KEY|PASSWORD|CREDENTIAL|API_SECRET)']
        langs: [py, ts, js]
    proof:
      description: >
        Anything with a client-exposed prefix (NEXT_PUBLIC_, VITE_, REACT_APP_,
        EXPO_PUBLIC_, PUBLIC_) is compiled INTO the browser bundle and readable by
        anyone. No API key/secret/token may carry such a prefix. Supabase: only the
        anon key is client-safe; the service_role key must never reach the client.
      templates: { typescript-node: templates/typescript-node/client_env_exposure.test.ts }
    pass_criteria: No secret-bearing var uses a client-exposed prefix; service_role never client-side.
    fail_action: Class-1. Move the secret server-side; rotate it (assume exposed).
    ref: references/secrets-and-ops.md#2
    source: "intake 2026-06-18 reel4 (instagram.com/reel/DZU-RaVRCrt) + reel5 (DYDezT5xnIS) anon-vs-service_role"

  - id: AUTH-STORAGE-001
    title: Auth token/session not stored in localStorage/sessionStorage
    domain: client-exposure
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [CWE-922, OWASP A07:2021]
    frameworks: { nist_csf: [PR.AA, PR.DS] }
    applicability:
      question: Does the frontend persist an auth token/session client-side?
      auto_probe:
        type: antipattern
        patterns: ['(localStorage|sessionStorage)\.setItem\([^)]*(token|jwt|access|refresh|session|auth)', 'localStorage\[[^]]*(token|jwt|auth)']
        langs: [ts, js]
    proof:
      description: >
        A token in localStorage/sessionStorage is readable by any XSS. Store auth in an
        HttpOnly+Secure+SameSite cookie (or keep the access token in memory only). Also
        clear client storage on logout/tab-close; never persist PII (email, phone,
        national-id) client-side.
      templates: { typescript-node: templates/typescript-node/auth_storage.test.ts }
    pass_criteria: No auth token/PII in localStorage/sessionStorage; tokens in HttpOnly cookie or memory.
    fail_action: Class-1/2. Move token to HttpOnly cookie; clear storage on logout.
    ref: references/more-controls.md#8
    source: "intake 2026-06-18 reel1 (instagram.com/reel/DZsXW-HonCi) #1 + reel4 (DZU-RaVRCrt)"

  - id: SOURCEMAP-001
    title: Production source maps are not publicly served
    domain: client-exposure
    phase: static
    severity: medium
    method: static-scan
    oracle: [CWE-540, OWASP A05:2021]
    applicability:
      question: Is this a bundled frontend (Next.js/Vite/webpack) deployed to prod?
      auto_probe:
        type: antipattern
        patterns: ['productionBrowserSourceMaps:\s*true', 'sourcemap:\s*true', 'devtool:\s*[\x27"]source-map']
        langs: [ts, js]
    proof:
      description: >
        Public prod source maps expose your original TSX/JS source (logic, comments,
        sometimes secrets) in DevTools. Disable prod browser source maps, or restrict
        .map files from public serving.
    pass_criteria: No publicly served .map files in production; prod sourcemaps disabled or access-controlled.
    fail_action: Class-2. Disable productionBrowserSourceMaps / restrict .map serving.
    ref: references/secrets-and-ops.md#3
    source: "intake 2026-06-18 reel4 (instagram.com/reel/DZU-RaVRCrt)"

  # ---- access-control additions ----

  - id: AUTHZ-SERVER-001
    title: Authorization enforced server-side (no client-side-only role checks)
    domain: access-control
    phase: adversarial
    severity: critical
    method: adversarial-test
    oracle: [OWASP A01:2021, OWASP API5:2023, CWE-602]
    frameworks: { nist_csf: [PR.AA], mitre_attack: [T1548] }
    applicability:
      question: Does the app gate admin/privileged UI or actions by role?
      auto_probe:
        type: antipattern
        patterns: ['if\s*\(\s*(user|currentUser|session)\.(isAdmin|role|is_admin)', 'user\.role\s*===\s*[\x27"]admin']
        langs: [ts, js]
    proof:
      description: >
        A client-side `if (user.isAdmin)` only hides the button — the API must re-check.
        Call every privileged endpoint directly with a NON-admin (but valid) token ->
        must 403, regardless of what the UI shows. Companion to BFLA-001.
      templates: { typescript-node: templates/typescript-node/server_authz.test.ts }
    pass_criteria: Every privileged action is denied (403) server-side for a non-privileged token.
    fail_action: Class-1. Enforce authz on the server; client checks are UX only.
    ref: references/hardening-playbook.md#5b
    source: "intake 2026-06-18 reel1 (instagram.com/reel/DZsXW-HonCi) #2"

  - id: AUTHN-REQUIRED-001
    title: Every data endpoint requires authentication (the unauthenticated-request test)
    domain: access-control
    phase: adversarial
    severity: critical
    method: adversarial-test
    oracle: [OWASP API2:2023, OWASP A01:2021]
    frameworks: { nist_csf: [PR.AA], mitre_attack: [T1190] }
    applicability:
      question: Does the app expose endpoints that read/return data?
      auto_probe: { type: manual }
    proof:
      description: >
        The "Postman test": hit every data endpoint with NO credentials -> must 401,
        never 200-with-data. An open endpoint lets any unauthenticated user query your
        DB. Enumerate from the route inventory (INV-001) and probe each anonymously.
      templates:
        python-fastapi: templates/python-fastapi/test_authn_required.py
        typescript-node: templates/typescript-node/authn_required.test.ts
    pass_criteria: Every non-public endpoint returns 401 to an unauthenticated request.
    fail_action: Class-1. Add an auth guard to the endpoint (default-deny).
    ref: references/hardening-playbook.md#1
    source: "intake 2026-06-18 reel5 (instagram.com/reel/DYDezT5xnIS) + reel6 (DXz5iIwxiuF) #1"

  - id: SUPABASE-RLS-001
    title: Row-Level Security enabled on every table holding user/tenant data
    domain: access-control
    phase: adversarial
    severity: critical
    method: adversarial-test
    oracle: [OWASP API1:2023, CWE-639]
    applicability:
      question: Does the app use Supabase/Postgres with client-accessible tables?
      auto_probe:
        type: grep_present
        patterns: ['supabase', 'createClient', 'enable row level security', 'ENABLE ROW LEVEL SECURITY', 'auth\.uid\(\)']
        langs: [ts, js, sql]
    proof:
      description: >
        With Supabase the anon key reaches the DB directly from the browser; the ONLY
        thing stopping cross-tenant reads is RLS. Every table with user/tenant data must
        have RLS ENABLED and a policy scoped to auth.uid(). The "#1 Supabase gap" is a
        table with RLS off. Prove with the cross-tenant RLS test.
      templates: { supabase-postgres: templates/supabase-postgres/bola_rls.sql }
    pass_criteria: RLS enabled on all user/tenant tables; cross-tenant read/write returns nothing.
    fail_action: Class-1. Enable RLS + owner-scoped policy on every such table.
    ref: references/hardening-playbook.md#1
    source: "intake 2026-06-18 reel5 (instagram.com/reel/DYDezT5xnIS) RLS the #1 Supabase gap"

  - id: EXCESSDATA-001
    title: API responses expose only needed fields (no excessive data exposure)
    domain: access-control
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP API3:2023]
    applicability:
      question: Do API responses serialize whole DB objects/rows?
      auto_probe:
        type: antipattern
        patterns: ['res\.json\((user|row|record|profile)\)', 'return jsonify\((user|row|record|profile)\)']
        langs: [py, ts, js, sql]
    proof:
      description: >
        Returning the full row leaks fields the client never needs (password_hash,
        internal flags, other users' PII). Serialize via an explicit allow-list
        (response schema/DTO), not the raw model. Test: fetch an object and assert no
        sensitive field is present.
    pass_criteria: Responses contain only allow-listed fields; no secret/internal/PII field leaks.
    fail_action: Class-1/2. Use explicit response schemas (DTOs), never raw models.
    ref: references/hardening-playbook.md#1
    source: "intake 2026-06-18 ACS corpus (exploiting-excessive-data-exposure-in-api)"

  - id: APIINV-001
    title: API inventory complete — no shadow/undocumented/legacy endpoints
    domain: access-control
    phase: decision
    severity: medium
    method: decision
    oracle: [OWASP API9:2023]
    applicability:
      question: Does the app expose an HTTP API?
      auto_probe: { type: manual }
    proof:
      description: >
        Shadow endpoints (old /v1, debug, /test, unlinked admin) are unmonitored and
        often unprotected. Maintain a complete inventory (from INV-001), retire legacy
        versions, and ensure every live route is in the auth + rate-limit + logging map.
    pass_criteria: Every reachable route is inventoried, versioned, and covered by the standard controls.
    fail_action: Class-2. Enumerate + retire/guard shadow endpoints.
    ref: references/security-testing-methodology.md#8
    source: "intake 2026-06-18 ACS corpus (detecting-shadow-api-endpoints, performing-api-inventory)"

  - id: PATHTRAV-001
    title: Path/directory traversal blocked on any file-path input
    domain: access-control
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [CWE-22, OWASP A01:2021]
    applicability:
      question: Does any endpoint take a filename/path or serve files by user input?
      auto_probe:
        type: grep_present
        patterns: ['send_file', 'sendFile', 'os\.path\.join\([^)]*request', 'readFile\([^)]*req', 'path\.join\([^)]*req']
        langs: [py, ts, js]
    proof:
      description: >
        Inputs like `../../etc/passwd`, encoded `%2e%2e%2f`, and absolute paths must not
        escape the intended directory. Canonicalize and confirm the resolved path stays
        within the allowed root; reject otherwise.
      templates: { python-fastapi: templates/python-fastapi/test_path_traversal.py }
    pass_criteria: Traversal payloads (encoded + absolute) cannot read files outside the allowed root.
    fail_action: Class-1. Canonicalize + confine to an allow-listed base dir.
    ref: references/more-controls.md#1
    source: "intake 2026-06-18 ACS corpus (performing-directory-traversal-testing)"

  - id: REDIRECT-001
    title: No open redirect on user-supplied redirect/next URLs
    domain: access-control
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [CWE-601, OWASP A01:2021]
    applicability:
      question: Does the app redirect to a user-supplied URL (next/redirect/returnTo)?
      auto_probe:
        type: grep_present
        patterns: ['redirect\([^)]*(request|req|params|query)', 'returnTo', 'redirect_url', 'window\.location\s*=']
        langs: [py, ts, js]
    proof:
      description: >
        An attacker-controlled redirect target enables phishing and OAuth token theft.
        Allow only relative paths or an allow-list of hosts; reject absolute/external
        URLs and protocol-relative (//evil.com) targets.
      templates: { python-fastapi: templates/python-fastapi/test_open_redirect.py }
    pass_criteria: External/protocol-relative redirect targets are rejected; only allow-listed destinations pass.
    fail_action: Class-2. Allow-list redirect targets; default to a known-safe path.
    ref: references/more-controls.md#1
    source: "intake 2026-06-18 ACS corpus (testing-for-open-redirect-vulnerabilities)"

  - id: WEBSOCKET-001
    title: WebSocket endpoints validate Origin and authenticate
    domain: access-control
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [CWE-1385, OWASP A01:2021]
    applicability:
      question: Does the app expose WebSocket endpoints?
      auto_probe:
        type: grep_present
        patterns: ['websocket', 'WebSocket', 'socket\.io', 'wss://', '\.on\([\x27"]connection']
        langs: [py, ts, js]
    proof:
      description: >
        WebSockets are not protected by SOP/CORS. Validate the Origin header on the
        handshake (cross-site WebSocket hijacking) and authenticate the connection
        (token in the handshake), then authorize each message.
    pass_criteria: WS handshakes from unauthorized origins/without auth are rejected.
    fail_action: Class-2. Validate Origin + authenticate the WS handshake.
    ref: references/more-controls.md#8
    source: "intake 2026-06-18 ACS corpus (testing-websocket-api-security)"

  # ---- authn-session-jwt additions ----

  - id: ACCT-VERIFY-001
    title: Account/email verification (and 2FA option) so identities can't be spoofed
    domain: authn-session-jwt
    phase: decision
    severity: medium
    method: decision
    oracle: [OWASP A07:2021, OWASP ASVS V2]
    applicability:
      question: Can users self-register with an email/identity?
      auto_probe: { type: manual }
    proof:
      description: >
        Without email verification, anyone can sign up AS anyone (claim someone else's
        email/identity). Require verified email before privileged use; offer 2FA/OTP for
        sensitive accounts. See JWT-002 for the 2FA-token-purpose trap.
    pass_criteria: Email verification enforced before trust; 2FA available for sensitive roles.
    fail_action: Class-2. Add email verification; offer TOTP/OTP 2FA.
    ref: references/hardening-playbook.md#5b
    source: "intake 2026-06-18 reel1 (instagram.com/reel/DZsXW-HonCi) #3"

  - id: PWPOLICY-001
    title: Password policy + breached-password (HIBP) check at register/reset
    domain: authn-session-jwt
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [NIST SP 800-63B, OWASP A07:2021, OWASP ASVS V2.1.7]
    applicability:
      question: Does the app have password-based registration / reset?
      auto_probe: { type: manual }
    proof:
      description: >
        Enforce a length-first policy (>=8, ideally >=12; allow long passphrases) and
        check candidates against a breached-password corpus (HaveIBeenPwned k-anonymity
        range API) — reject known-leaked passwords. Avoid the composition rules NIST
        800-63B advises against.
      templates: { python-fastapi: templates/python-fastapi/test_password_policy.py }
    pass_criteria: Weak/known-breached passwords are rejected at register and reset.
    fail_action: Class-2. Add length policy + HIBP range-API check.
    ref: references/hardening-playbook.md#4
    source: "intake 2026-06-18 reel1 (instagram.com/reel/DZsXW-HonCi) #5"

  - id: TOKEN-ROTATE-001
    title: Refresh-token rotation + working logout/session invalidation
    domain: authn-session-jwt
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP A07:2021, RFC 9700]
    applicability:
      question: Does the app issue refresh tokens / long-lived sessions?
      auto_probe:
        type: grep_present
        patterns: ['refresh_token', 'refreshToken', 'rotate', 'revoke', 'logout', 'signOut']
        langs: [py, ts, js]
    proof:
      description: >
        On refresh, the old refresh token must be invalidated (rotation) so a stolen one
        can't be reused; reuse of a rotated token should revoke the family. Logout must
        actually invalidate the session/refresh token server-side, not just drop the
        client copy.
      templates: { python-fastapi: templates/python-fastapi/test_token_rotation.py }
    pass_criteria: Rotated/old refresh token is rejected; logout invalidates the server-side session.
    fail_action: Class-1/2. Implement rotation + server-side revocation on logout.
    ref: references/hardening-playbook.md#5
    source: "intake 2026-06-18 reel5 (instagram.com/reel/DYDezT5xnIS) refresh-rotation + logout-invalidation"

  - id: COOKIE-FLAGS-001
    title: Auth/session cookies set HttpOnly + Secure + SameSite
    domain: authn-session-jwt
    phase: static
    severity: high
    method: static-scan
    oracle: [OWASP A05:2021, CWE-1004, CWE-614]
    applicability:
      question: Does the app set auth/session cookies?
      auto_probe:
        type: grep_present
        patterns: ['set_cookie', 'Set-Cookie', 'res\.cookie', 'response\.set_cookie', 'cookies\.set']
        langs: [py, ts, js]
    proof:
      description: >
        Every auth/session cookie must be HttpOnly (no JS access -> XSS can't steal it),
        Secure (HTTPS only), and SameSite=Lax/Strict (CSRF defense-in-depth). Verify the
        actual Set-Cookie header on the login response, not just the config intent.
    pass_criteria: Auth cookies carry HttpOnly + Secure + SameSite on the live response.
    fail_action: Class-1/2. Add the missing attributes.
    ref: references/more-controls.md#8
    source: "intake 2026-06-18 reel4 (instagram.com/reel/DZU-RaVRCrt) + reel5 cookie-configuration"

  - id: OAUTH-001
    title: OAuth2/OIDC hardening — exact redirect_uri, state/PKCE, scope minimization
    domain: authn-session-jwt
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [RFC 9700, OWASP A07:2021]
    applicability:
      question: Does the app implement OAuth2/OIDC (social login, third-party authz)?
      auto_probe:
        type: grep_present
        patterns: ['oauth', 'redirect_uri', 'openid', 'code_challenge', 'id_token']
        langs: [py, ts, js]
    proof:
      description: >
        Validate redirect_uri by EXACT match against an allow-list (no prefix/substring);
        require the `state` param (CSRF) and PKCE for public clients; validate id_token
        aud/iss/nonce; request least-privilege scopes. Test tampered redirect_uri,
        missing/replayed state, downgraded PKCE -> all rejected.
      templates: { python-fastapi: templates/python-fastapi/test_oauth.py }
    pass_criteria: redirect_uri exact-matched; state+PKCE enforced; id_token claims validated; scopes minimal.
    fail_action: Class-1. Pin redirect_uri; enforce state+PKCE; validate token claims.
    ref: references/hardening-playbook.md#5
    source: "intake 2026-06-18 ACS corpus (configuring-oauth2-authorization-flow, exploiting-oauth-misconfiguration)"

  # ---- injection-input additions ----

  - id: XXE-001
    title: XML parsing disables external entities (no XXE)
    domain: injection-input
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [CWE-611, OWASP A05:2021]
    applicability:
      question: Does the app parse XML (or SVG/DOCX/SOAP) from users?
      auto_probe:
        type: grep_present
        patterns: ['etree', 'lxml', 'xml\.dom', 'minidom', 'SAXParser', 'DocumentBuilder', 'libxml']
        langs: [py, ts, js]
    proof:
      description: >
        XXE lets a crafted document read local files or trigger SSRF via external
        entities. Disable DTD/external-entity resolution (e.g. defusedxml in Python;
        disable external entities in the JS/Java parser). Test a payload with an external
        entity -> not resolved.
      templates: { python-fastapi: templates/python-fastapi/test_xxe.py }
    pass_criteria: External entities/DTDs are not resolved; XXE payload cannot read files or fetch URLs.
    fail_action: Class-1. Disable external entities; use a hardened/defused XML parser.
    ref: references/more-controls.md#1
    source: "intake 2026-06-18 ACS corpus (testing-for-xxe-injection-vulnerabilities)"

  - id: SSTI-001
    title: No server-side template injection on user input
    domain: injection-input
    phase: adversarial
    severity: critical
    method: adversarial-test
    oracle: [CWE-1336, OWASP A03:2021]
    applicability:
      question: Does the app render templates (Jinja2/Handlebars/EJS/Twig) with user input?
      auto_probe:
        type: antipattern
        patterns: ['render_template_string', 'Template\([^)]*request', 'from_string', 'new Function\(', 'Handlebars\.compile\([^)]*req']
        langs: [py, ts, js]
    proof:
      description: >
        Concatenating user input into a template string lets an attacker execute template
        (and often host) code (e.g. {{7*7}} -> 49, then RCE gadgets). Never build
        templates from user input; pass user data as template VARIABLES, not as the
        template source. Test {{7*7}} / ${7*7} -> rendered literally, not evaluated.
      templates: { python-fastapi: templates/python-fastapi/test_ssti.py }
    pass_criteria: Template-expression payloads are not evaluated; user data is only ever a variable.
    fail_action: Class-1. Stop compiling templates from user input; sandbox if unavoidable.
    ref: references/security-testing-methodology.md#5
    source: "intake 2026-06-18 ACS corpus (exploiting-template-injection-vulnerabilities)"

  - id: NOSQLI-001
    title: No NoSQL/operator injection (Mongo/JSON query)
    domain: injection-input
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [CWE-943, OWASP A03:2021]
    applicability:
      question: Does the app query a NoSQL store (Mongo, etc.) with user input?
      auto_probe:
        type: grep_present
        patterns: ['collection\.find', 'mongoose', 'mongo', '\$where', '\$ne']
        langs: [py, ts, js]
    proof:
      description: >
        Passing a raw JSON body into a query lets `{"$ne": null}` / `{"$gt": ""}` bypass
        auth filters, and `$where` run JS. Coerce/validate types (a password field must
        be a string, not an object); never pass user objects straight into the query.
      templates: { typescript-node: templates/typescript-node/nosql_injection.test.ts }
    pass_criteria: Operator-injection payloads (objects where scalars expected) are rejected.
    fail_action: Class-1. Enforce types; reject query operators in user-supplied values.
    ref: references/security-testing-methodology.md#5
    source: "intake 2026-06-18 ACS corpus (exploiting-nosql-injection-vulnerabilities)"

  - id: HOSTHDR-001
    title: Host/X-Forwarded-Host header not trusted for security decisions
    domain: injection-input
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [CWE-644]
    applicability:
      question: Does the app build URLs (password-reset links, absolute redirects) from the Host header?
      auto_probe:
        type: grep_present
        patterns: ['request\.host', 'req\.headers\.host', 'X-Forwarded-Host', 'get_host', 'url_root']
        langs: [py, ts, js]
    proof:
      description: >
        A spoofed Host/X-Forwarded-Host poisons password-reset links (sent to your user
        pointing at the attacker's host) and cache. Use a configured canonical
        host/allow-list for generating absolute URLs; never echo the request Host.
    pass_criteria: Absolute URLs use a configured host; a spoofed Host does not change generated links.
    fail_action: Class-2. Pin a canonical host; allow-list trusted hosts.
    ref: references/hardening-playbook.md#3
    source: "intake 2026-06-18 ACS corpus (testing-for-host-header-injection)"

  # ---- headers-cors-csrf addition ----

  - id: CLICKJACK-001
    title: Clickjacking blocked (frame-ancestors / X-Frame-Options)
    domain: headers-cors-csrf
    phase: static
    severity: medium
    method: static-scan
    oracle: [CWE-1021, OWASP A05:2021]
    applicability:
      question: Does the app serve HTML pages (especially with sensitive actions)?
      auto_probe:
        type: grep_present
        patterns: ['frame-ancestors', 'X-Frame-Options', 'frameguard']
        langs: [py, ts, js]
    proof:
      description: >
        Without frame-ancestors/X-Frame-Options, your page can be invisibly iframed and
        clickjacked. Set CSP frame-ancestors 'none' (or 'self'), or X-Frame-Options DENY.
        Verify the header on an actual page response.
    pass_criteria: Sensitive pages send CSP frame-ancestors or X-Frame-Options DENY.
    fail_action: Class-2. Add frame-ancestors 'none' / X-Frame-Options DENY.
    ref: references/hardening-playbook.md#7
    source: "intake 2026-06-18 ACS corpus (performing-clickjacking-attack-test)"

  # ---- rate-abuse addition ----

  - id: PAGINATION-001
    title: Collection endpoints enforce pagination + a max page size
    domain: rate-abuse
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [OWASP API4:2023, CWE-770]
    applicability:
      question: Are there list/collection endpoints returning many records?
      auto_probe:
        type: grep_present
        patterns: ['findAll', '\.all\(\)', 'per_page', 'page_size', 'limit', 'offset']
        langs: [py, ts, js, sql]
    proof:
      description: >
        Returning everything lets one request dump the whole table (data exfiltration +
        resource exhaustion). Enforce server-side pagination with a hard max page size; a
        request for limit=10000000 must be capped, not honored.
      templates: { python-fastapi: templates/python-fastapi/test_pagination.py }
    pass_criteria: List endpoints cap results at a max page size regardless of client-requested size.
    fail_action: Class-2. Enforce a server-side max limit + pagination.
    ref: references/more-controls.md#5
    source: "intake 2026-06-18 reel6 (instagram.com/reel/DXz5iIwxiuF) #2"

  # ---- secrets-logging addition ----

  - id: ERRORLEAK-001
    title: Error responses are sanitized (no stack trace / SQL / internals to client)
    domain: secrets-logging
    phase: adversarial
    severity: medium
    method: adversarial-test
    oracle: [CWE-209, OWASP A05:2021]
    applicability:
      question: Does the app return errors to clients?
      auto_probe:
        type: antipattern
        patterns: ['return.*traceback\.format_exc', 'jsonify\([^)]*str\(e\)', 'res\.(send|json)\([^)]*err\.(stack|message)', 'printStackTrace']
        langs: [py, ts, js]
    proof:
      description: >
        Raw errors (stack traces, SQL messages, file paths, framework versions) hand
        attackers a map of your system. Return a generic message + a correlation id to
        the client; log the detail server-side only. Force a 500 and a 4xx -> assert the
        body has no stack/SQL/path.
      templates: { python-fastapi: templates/python-fastapi/test_error_sanitization.py }
    pass_criteria: Client error bodies carry no stack trace, SQL text, file path, or internal detail.
    fail_action: Class-2. Generic client errors + server-side detail logging.
    ref: references/hardening-playbook.md#7
    source: "intake 2026-06-18 reel6 (instagram.com/reel/DXz5iIwxiuF) #3"

  # ---- deps-supplychain addition ----

  - id: CISEC-001
    title: CI pipeline runs SAST + dependency (SCA) + secret scanning as a gate
    domain: deps-supplychain
    phase: static
    severity: medium
    method: static-scan
    oracle: [OWASP A06:2021, OWASP A08:2021]
    applicability:
      question: Does the repo have a CI pipeline?
      auto_probe:
        type: grep_present
        patterns: ['gitleaks', 'trufflehog', 'snyk', 'semgrep', 'codeql', 'osv-scanner', 'trivy', 'dependabot', 'pip-audit', 'npm audit', 'zap']
        langs: [yaml]
    proof:
      description: >
        Shift-left: the pipeline should run a secret scan (gitleaks), a dependency/SCA
        scan (pip-audit/npm audit/snyk/osv), and a SAST pass (semgrep/codeql), and FAIL
        the build on high/critical. Optionally a DAST pass (OWASP ZAP) on a preview.
    pass_criteria: CI runs secret + SCA + SAST scans and gates on high/critical findings.
    fail_action: Class-2. Add the scanners to CI and make high/critical fail the build.
    ref: references/more-controls.md#6
    source: "intake 2026-06-18 ACS corpus (integrating-sast/dast, secret-scanning-in-ci-cd, sca-dependency-scanning)"

  # =========================================================================
  # PHASE C — IN additions (from the multi-LLM council blueprint; see ROADMAP.md)
  #   ~15 checks a real Vercel/Supabase/Stripe SaaS actually bleeds from.
  # =========================================================================

  - id: SCOPE-001
    title: Authorized scope, environments, accounts, and rate caps are defined
    domain: deploy-ops
    phase: decision
    severity: high
    method: decision
    oracle: [internal framework]
    applicability:
      question: Will any live/dynamic check run against a deployed target?
      auto_probe:
        type: manual
    proof:
      description: >
        Record the authorized targets (which URLs/environments), the test accounts/tenants, the
        rate/concurrency caps, and an explicit "we own / are authorized to test this" sign-off.
        No adversarial or dynamic check should run until SCOPE-001 is recorded.
    pass_criteria: A scope record exists (targets, environments, accounts, caps, authorization).
    fail_action: Define scope before any live test. Unauthorised testing is the line you do not cross.
    ref: references/secrets-and-ops.md#4
    source: "council 2026-06-21 (GPT voice-1 Stage-0 safety gate)"

  - id: DATA-SAFETY-001
    title: Test blast-radius classified (mutate / email / pay / LLM / webhook)
    domain: deploy-ops
    phase: decision
    severity: high
    method: decision
    oracle: [internal framework]
    applicability:
      question: Could any check mutate data, send email/SMS, hit payments, call an LLM, or fire webhooks?
      auto_probe:
        type: manual
    proof:
      description: >
        For the selected environment, classify whether tests may mutate data, send messages, create
        billing events, call paid models, or trigger external webhooks -- and confirm a rollback/
        snapshot exists. Destructive / cost / external-side-effect checks stay OFF until classified.
    pass_criteria: Blast-radius is classified per check family; a rollback path is confirmed.
    fail_action: Classify before running; default destructive / cost / external checks to OFF.
    ref: references/secrets-and-ops.md#1
    source: "council 2026-06-21 (GPT voice-1 Stage-0 safety gate)"

  - id: SBA-ANON-001
    title: Supabase anon key present but a table is missing RLS (instant DB compromise)
    domain: access-control
    phase: static
    severity: critical
    method: static-scan
    oracle: [OWASP API1:2023, CWE-284]
    applicability:
      question: Does the app expose a Supabase anon key to the client?
      auto_probe:
        type: grep_present
        patterns: ['NEXT_PUBLIC_SUPABASE_ANON_KEY', 'VITE_SUPABASE_ANON_KEY', 'createClient\([^)]*ANON', 'SUPABASE_ANON_KEY']
        langs: [ts, js]
    proof:
      description: >
        The anon key is public BY DESIGN -- its only protection is Row-Level Security. A single table
        without RLS = the whole table readable/writable by anyone via the client SDK. PROVE every
        table reachable by the anon role has RLS enabled (pg_class.relrowsecurity) and a policy.
        Adversarially: with the anon key, attempt to read another tenant's row -> must fail.
      templates:
        supabase-postgres: templates/supabase-postgres/anon_rls_audit.sql
    pass_criteria: Every anon-reachable table has RLS enabled + a restricting policy; anon cannot read cross-tenant rows.
    fail_action: Class-1 (critical). Enable RLS on every table + a USING/WITH CHECK policy. The #1 Supabase launch gap.
    ref: references/hardening-playbook.md#1
    source: "council 2026-06-21 (Gemini voice-2 serverless; reel5 Supabase guide)"

  - id: NEXT-RSC-001
    title: React Server Component leaks DB objects / PII to the client
    domain: client-exposure
    phase: static
    severity: high
    method: static-scan
    oracle: [OWASP API3:2023, CWE-200]
    applicability:
      question: Does the app use the Next.js App Router (React Server Components)?
      auto_probe:
        type: grep_present
        patterns: ['use client', 'createServerComponent', 'async function \w*Page\(', 'app/.*/page\.tsx']
        langs: [ts, js]
    proof:
      description: >
        Passing a whole DB record (user, account, order) from a server component into a client
        component prop serialises it into the page's __next_f script -- exposing password hashes,
        internal flags, and PII in the HTML. PROVE server components pass only the fields the client
        needs (a DTO), never a raw ORM row, across a "use client" boundary.
      templates:
        typescript-node: templates/typescript-node/rsc_leak.test.ts
    pass_criteria: No raw DB object crosses a server -> client component boundary; only explicit DTOs.
    fail_action: Class-1/2. Map the row to a minimal DTO before passing it to a client component.
    ref: references/more-controls.md#8
    source: "council 2026-06-21 (Gemini voice-2 Next.js realities)"

  - id: ANALYTICS-PII-001
    title: Analytics / telemetry does not receive secrets or high-risk PII
    domain: client-exposure
    phase: static
    severity: medium
    method: static-scan
    oracle: [CWE-201, OWASP A09:2021]
    applicability:
      question: Does the app send events to analytics / session-replay / error tools?
      auto_probe:
        type: grep_present
        patterns: ['posthog\.capture', 'mixpanel\.track', 'analytics\.(track|identify)', 'Sentry\.(captureException|setUser)', 'datadog', 'amplitude']
        langs: [ts, js]
    proof:
      description: >
        Plant a known secret/PII (token, email, card) into an event payload path and assert it is NOT
        sent to PostHog/Sentry/Segment/etc. Session-replay (full DOM capture) is the worst offender --
        mask inputs. Reuse the same secret scrubber as logs.
    pass_criteria: No secret/PII format reaches an analytics/replay/error sink; sensitive inputs masked.
    fail_action: Class-2. Scrub event payloads; enable replay masking; don't identify() with PII you don't need.
    ref: references/ai-llm-security.md#3
    source: "council 2026-06-21 (GPT voice-1 ANALYTICS-PII)"

  - id: EDGE-MW-001
    title: Edge / Next middleware auth cannot be bypassed (matcher / casing / rewrite)
    domain: access-control
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP API1:2023, CWE-287]
    applicability:
      question: Does the app enforce auth in Next.js middleware / edge functions by URL path?
      auto_probe:
        type: grep_present
        patterns: ['export function middleware', 'export const config = \{[^}]*matcher', 'NextResponse\.(redirect|rewrite)', 'middleware\.(ts|js)']
        langs: [ts, js]
    proof:
      description: >
        Middleware gating `/dashboard/:path*` by matcher is bypassable via casing (/Dashboard),
        trailing slashes, path traversal, internal rewrites, or a matcher gap. Fuzz the restricted
        routes with these tricks as an unauthenticated client -> every variant stays blocked (redirect/
        401), never served.
      templates:
        typescript-node: templates/typescript-node/edge_mw_bypass.test.ts
    pass_criteria: Every casing/slash/rewrite/traversal variant of a protected route is blocked for an unauthenticated client.
    fail_action: Class-1. Enforce authz in the route handler too (defence in depth); normalise paths; widen the matcher.
    ref: references/hardening-playbook.md#1
    source: "council 2026-06-21 (Gemini voice-2 Edge middleware)"

  - id: DMARC-001
    title: Email authentication configured (SPF + DKIM + DMARC)
    domain: email-dns-tls
    phase: static
    severity: medium
    method: static-scan
    oracle: [RFC 7489]
    applicability:
      question: Does the product send email from its own domain?
      auto_probe:
        type: command
        command: 'checkdmarc $BEDROCK_DOMAIN'
        absent_status: NEEDS-PROOF
    proof:
      description: >
        SPF, DKIM, and DMARC records exist; DMARC policy is at least quarantine/reject on the
        production domain -- otherwise your transactional / password-reset emails are spoofable.
    pass_criteria: SPF + DKIM + DMARC present; DMARC p=quarantine or reject.
    fail_action: Class-2. Publish the DNS records; move DMARC to quarantine then reject.
    ref: references/more-controls.md#2
    source: "council 2026-06-21 (GPT voice-1 DMARC)"

  - id: CERT-001
    title: TLS certificate + HSTS posture is strong
    domain: email-dns-tls
    phase: static
    severity: medium
    method: static-scan
    oracle: [OWASP A02:2021]
    applicability:
      question: Does the app serve over HTTPS on its own domain?
      auto_probe:
        type: command
        command: 'testssl.sh --quiet --severity HIGH $BEDROCK_URL'
        fallback_command: 'sslyze $BEDROCK_DOMAIN'
        absent_status: NEEDS-PROOF
    proof:
      description: >
        Valid cert chain, no weak TLS versions/ciphers (no TLS < 1.2, no RC4/3DES), and HSTS set on
        the production app domain.
    pass_criteria: TLS 1.2+ only, strong ciphers, valid chain, HSTS present.
    fail_action: Class-2. Disable weak protocols/ciphers; add HSTS.
    ref: references/hardening-playbook.md#7
    source: "council 2026-06-21 (GPT voice-1 CERT)"

  - id: DNS-001
    title: No dangling DNS records / subdomain takeover
    domain: email-dns-tls
    phase: static
    severity: high
    method: static-scan
    oracle: [CWE-350]
    applicability:
      question: Does the product use custom / preview subdomains pointing at third-party services?
      auto_probe:
        type: command
        command: 'subzy run --target $BEDROCK_DOMAIN'
        fallback_command: 'subjack -d $BEDROCK_DOMAIN'
        absent_status: NEEDS-PROOF
    proof:
      description: >
        No CNAME points at an unclaimed third-party service (S3/Vercel/Heroku/etc.); no stale preview/
        custom-domain record an attacker could claim and serve content from your subdomain.
    pass_criteria: Zero dangling / claimable subdomain records.
    fail_action: Class-1/2. Remove the dangling record or reclaim the resource.
    ref: references/more-controls.md#1
    source: "council 2026-06-21 (GPT voice-1 DNS)"

  - id: BILLING-WEBHOOK-001
    title: Billing provider webhook state transitions are safe
    domain: billing-entitlement
    phase: adversarial
    severity: critical
    method: adversarial-test
    oracle: [OWASP API6:2023]
    applicability:
      question: Does a payment-provider webhook (Stripe/Paddle/LemonSqueezy) grant or change entitlement?
      auto_probe:
        type: grep_present
        patterns: ['checkout\.session\.completed', 'customer\.subscription', 'invoice\.payment', 'paddle.*webhook', 'lemonsqueezy', 'stripe.*webhook']
        langs: [ts, js, py]
    proof:
      description: >
        Beyond signature verification (WEBHOOK-001): out-of-order events must not grant the wrong
        entitlement; duplicate events are idempotent; cancel/downgrade/refund/dispute correctly REVOKE
        access. Replay an old `subscription.updated` after a cancel -> access stays revoked.
      templates:
        typescript-node: templates/typescript-node/billing_webhook.test.ts
    pass_criteria: Entitlement matches the true subscription state under out-of-order, duplicate, and revoke events.
    fail_action: Class-1. Derive access from the provider's current state (or ordered events), not the latest webhook blindly.
    ref: references/more-controls.md#2
    source: "council 2026-06-21 (GPT voice-1 BILLING-WEBHOOK)"

  - id: ENTITLEMENT-001
    title: Paid-feature access cannot be forged
    domain: billing-entitlement
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP API1:2023, OWASP API6:2023]
    applicability:
      question: Does the app gate features by plan / entitlement?
      auto_probe:
        type: grep_present
        patterns: ['is_?pro', 'isPremium', 'entitlement', 'hasAccess', 'subscription', 'plan\s*[=:]', 'tier']
        langs: [ts, js, py]
    proof:
      description: >
        A free/lower-tier identity tries to use a paid feature by (a) flipping a client-side plan flag,
        (b) calling the gated API directly, (c) using tenant B's subscription id. The server must check
        entitlement from a trusted source on every gated action -> all three denied.
      templates:
        python-fastapi: templates/python-fastapi/test_entitlement.py
    pass_criteria: Paid actions are server-side entitlement-checked; client flags and cross-tenant subscription ids are ignored.
    fail_action: Class-1. Check entitlement server-side from the billing source of truth, per request.
    ref: references/hardening-playbook.md#1
    source: "council 2026-06-21 (GPT voice-1 ENTITLEMENT)"

  - id: CACHE-TENANT-001
    title: Cache keys are tenant-scoped (no cross-tenant cache bleed)
    domain: access-control
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP API1:2023, CWE-524]
    applicability:
      question: Does the app cache per-user / per-tenant responses or data (Redis, CDN, in-memory, SWR)?
      auto_probe:
        type: grep_present
        patterns: ['cache\.(get|set)', 'unstable_cache', 'revalidate', 'Cache-Control', 'memoize', 'redis']
        langs: [ts, js, py]
    proof:
      description: >
        A cache key missing the tenant/user dimension serves tenant A's response to tenant B. Request a
        cacheable resource as A, then as B with the same path -> B must NOT receive A's cached body.
        Confirm CDN/edge cache keys include the auth dimension, or the route is private/no-store.
      templates:
        typescript-node: templates/typescript-node/cache_tenant.test.ts
    pass_criteria: Every per-tenant cache key includes the tenant/user; no cross-tenant cache hit.
    fail_action: Class-1. Add tenant/user to the cache key, or mark per-user responses private/no-store.
    ref: references/hardening-playbook.md#1
    source: "council 2026-06-21 (GPT voice-1 CACHE-TENANT)"

  - id: ADMIN-001
    title: Admin routes require a server-side admin role
    domain: access-control
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP API5:2023]
    applicability:
      question: Are there admin / internal / back-office routes?
      auto_probe:
        type: grep_present
        patterns: ['/admin', 'isAdmin', 'is_admin', 'requireAdmin', 'AdminGuard', 'role.*admin']
        langs: [ts, js, py]
    proof:
      description: >
        A normal user token hits every admin/internal route -> 403. A support-tier role cannot reach
        owner-only controls. The admin check is server-side, not a hidden UI route. This is the
        admin-plane specialisation of BFLA-001.
      templates:
        python-fastapi: templates/python-fastapi/test_bfla.py
        typescript-node: templates/typescript-node/bfla.test.ts
    pass_criteria: Every admin route rejects a non-admin token (403) server-side.
    fail_action: Class-1. Enforce the admin role in the handler, server-side, on every admin route.
    ref: references/security-testing-methodology.md#5
    source: "council 2026-06-21 (GPT voice-1 ADMIN; folds into BFLA)"

  - id: LLM-BLIND-001
    title: LLM tools cannot be steered at internal infra (blind SSRF via the model)
    domain: llm-ai
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP LLM01:2025, CWE-918]
    applicability:
      question: Does an LLM have a tool that fetches a URL / makes an outbound request?
      auto_probe:
        type: grep_present
        patterns: ['fetch_url', 'web_search', 'browse', 'tools\s*[=:]\s*\[', 'function.*url']
        langs: [ts, js, py]
    proof:
      description: >
        A fetch/browse tool with no egress filtering lets a user prompt the model to read
        169.254.169.254 (cloud metadata), localhost, or internal services -- SSRF laundered through the
        model. Prompt the model to fetch internal targets via its tool -> the tool layer rejects them
        (the SSRF-001 allowlist), regardless of what the model decides.
      templates:
        python-fastapi: templates/python-fastapi/test_llm_blind_ssrf.py
    pass_criteria: The LLM's fetch tool enforces the SSRF allowlist (resolved-IP, no metadata/private), independent of the prompt.
    fail_action: Class-1. Apply SSRF-001's egress validation inside the tool, not via the prompt.
    ref: references/more-controls.md#1
    source: "council 2026-06-21 (Gemini voice-2 LLM-BLIND)"

  - id: RAG-TENANT-001
    title: RAG retrieval is tenant-scoped (no cross-tenant document leak)
    domain: llm-ai
    phase: adversarial
    severity: high
    method: adversarial-test
    oracle: [OWASP LLM06:2025, OWASP API1:2023]
    applicability:
      question: Does the app do RAG / vector retrieval over tenant documents?
      auto_probe:
        type: grep_present
        patterns: ['pgvector', 'pinecone', 'similarity_search', 'embedding', 'retriev', '\.query\([^)]*top_k']
        langs: [ts, js, py]
    proof:
      description: >
        Vector search without a tenant filter returns tenant B's documents to tenant A -- and a prompt
        injection ("ignore the filter") must not remove it, because the filter is enforced server-side,
        not by the model. As tenant A, ask a question whose answer lives in tenant B's corpus -> no B
        snippet is retrieved or cited.
      templates:
        python-fastapi: templates/python-fastapi/test_rag_tenant.py
    pass_criteria: Retrieval filters by tenant/permission server-side; no cross-tenant snippet is ever returned, even under injection.
    fail_action: Class-1. Filter the vector query by tenant at the DB/index layer; never rely on the prompt.
    ref: references/ai-llm-security.md#1
    source: "council 2026-06-21 (GPT + Gemini RAG-TENANT)"
